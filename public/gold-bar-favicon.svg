<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gold bar -->
  <rect x="15" y="30" width="70" height="40" rx="4" ry="4" fill="url(#goldGradient)" stroke="#DAA520" stroke-width="2"/>
  <!-- Highlight -->
  <rect x="20" y="35" width="60" height="8" rx="2" ry="2" fill="#FFFF99" opacity="0.6"/>
  <!-- Shadow -->
  <rect x="15" y="65" width="70" height="3" rx="1" ry="1" fill="#8B6914" opacity="0.4"/>
</svg>